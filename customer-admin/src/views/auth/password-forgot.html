<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정</title>
    <link rel="stylesheet" href="../../../css/base.css">
</head>
<body>

<div class="auth-wrap">
    <div class="auth-container">

        <!-- 로고 -->
        <div class="auth-logo">DJ테크트리</div>

        <!-- 입력 영역 -->
        <div class="auth-body">
            <div class="auth-tabs">
                <input type="radio" name="auth-role" id="role-teacher" value="teacher" class="auth-tab-radio" checked>
                <label for="role-teacher" class="auth-tab">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <path d="M2.5 8L6 11.5L13.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    강사
                </label>
                <input type="radio" name="auth-role" id="role-manager" value="manager" class="auth-tab-radio">
                <label for="role-manager" class="auth-tab">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
                        <path d="M2.5 8L6 11.5L13.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    관리자
                </label>
            </div>

            <hr class="auth-divider-bold auth-divider--my10">

            <!-- 제목 및 설명 -->
            <div class="auth-forgot-header">
                <h2 class="auth-title">비밀번호 재설정하기</h2>
                <p class="auth-forgot-desc">가입하신 이메일 주소를 입력하시면,<br>비밀번호를 재설정할 수 있는 인증 메일을 보내드립니다.</p>
            </div>

            <!-- 이메일 주소 -->
            <div class="auth-field-group">
                <label class="auth-field-label" for="auth-email">이메일 주소</label>
                <div class="auth-field">
                    <img src="../../images/form-ico-mail.svg" width="16" height="16" alt="">
                    <input type="email" id="auth-email" class="auth-field__input" placeholder="admin@example.com">
                </div>
            </div>

            <!-- 아이디 기억하기 -->
            <label class="auth-remember">
                <input type="checkbox" class="c-check">
                아이디 기억하기
            </label>
        </div>

        <!-- 버튼 및 기타 -->
        <div class="auth-footer">
            <button class="btn big gray">인증 메일 발송</button>
            <hr class="auth-divider">
            <p class="auth-help auth-help--back">
                <img src="../../images/ico-previous.svg" width="18" height="18" alt="">
                <span><a href="#">로그인</a> 화면으로 돌아가기</span>
            </p>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 완료</title>
    <link rel="stylesheet" href="../../../css/base.css">
</head>
<body>

<div class="c-modal-overlay" style="gap:30px;">

    <!-- 비밀번호 변경 완료 모달 -->
    <div class="c-modal">
        <div class="c-modal__content">
            <div class="c-modal__icon-wrap">
                <img src="../../images/ico-modal-success.svg" width="36" height="36" alt="">
            </div>
            <p class="c-modal__title">비밀번호 변경 완료</p>
            <p class="c-modal__desc">새로운 비밀번호로 로그인하실 수 있습니다.</p>
        </div>
        <div class="c-modal__footer">
            <button class="btn lg">확인</button>
        </div>
    </div>

    <!-- 오류 발생 모달 -->
    <div class="c-modal">
        <div class="c-modal__content">
            <div class="c-modal__icon-wrap c-modal__icon-wrap--error">
                <img src="../../images/ico-modal-error.svg" width="36" height="33" alt="">
            </div>
            <p class="c-modal__title">오류가 발생했습니다.</p>
            <p class="c-modal__desc">비밀번호는 영문, 숫자, 특수문자를 포함하여<br>8자 이상이어야 합니다.</p>
        </div>
        <div class="c-modal__footer">
            <button class="btn lg">확인</button>
        </div>
    </div>

</div>

</body>
</html>

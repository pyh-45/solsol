<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 설정</title>
    <link rel="stylesheet" href="../../../css/base.css">
</head>
<body>

<div class="auth-wrap">
    <div class="auth-container">

        <!-- 로고 -->
        <div class="auth-logo">DJ테크트리</div>

        <!-- 소개 영역 -->
        <div class="auth-reset-intro">
            <h2 class="auth-reset-intro__title">
                <span class="auth-reset-intro__role">{강사/관리자}</span> 로그인을 위한<br>새 비밀번호를 설정하세요
            </h2>
            <p class="auth-reset-intro__desc">보안을 위해 이전에 사용하지 않은 새로운 비밀번호를<br>설정해 주세요.</p>
        </div>

        <!-- 폼 영역 -->
        <div class="auth-body">
            <hr class="auth-divider">

            <!-- 새 비밀번호 -->
            <div class="auth-field-group">
                <label class="auth-field-label" for="new-password">새 비밀번호</label>
                <div class="auth-field">
                    <img src="../../images/form-ico-lock.svg" width="16" height="16" alt="">
                    <input type="password" id="new-password" class="auth-field__input" placeholder="새 비밀번호를 입력하세요">
                    <button class="auth-field__eye">
                        <img src="../../images/form-ico-eye.svg" width="16" height="16" alt="">
                    </button>
                </div>
                <div class="auth-strength">
                    <div class="auth-strength__bars">
                        <div class="auth-strength__bar"></div>
                        <div class="auth-strength__bar"></div>
                        <div class="auth-strength__bar"></div>
                        <div class="auth-strength__bar"></div>
                    </div>
                </div>
                <p class="auth-field-hint">8~16자, 영문 대소문자·숫자·특수문자 조합 필수</p>
            </div>

            <!-- 새 비밀번호 확인 -->
            <div class="auth-field-group">
                <label class="auth-field-label" for="new-password-confirm">새 비밀번호 확인</label>
                <div class="auth-field">
                    <img src="../../images/form-ico-lock.svg" width="16" height="16" alt="">
                    <input type="password" id="new-password-confirm" class="auth-field__input" placeholder="비밀번호를 한번 더 입력하세요.">
                    <button class="auth-field__eye">
                        <img src="../../images/form-ico-eye.svg" width="16" height="16" alt="">
                    </button>
                </div>
            </div>
        </div>

        <!-- 버튼 및 기타 -->
        <div class="auth-footer">
            <button class="btn big gray" onclick="document.getElementById('modal-pw-reset').classList.remove('is-hidden')">비밀번호 변경 완료</button>
            <hr class="auth-divider">
            <p class="auth-help auth-help--back">
                <img src="../../images/ico-previous.svg" width="18" height="18" alt="">
                <span><a href="#">로그인</a> 화면으로 돌아가기</span>
            </p>
        </div>

    </div>
</div>

<!-- 비밀번호 변경 완료 모달 -->
<div class="c-modal-overlay is-hidden" id="modal-pw-reset">
    <div class="c-modal">
        <div class="c-modal__content">
            <div class="c-modal__icon-wrap">
                <img src="../../images/ico-modal-success.svg" width="36" height="36" alt="">
            </div>
            <p class="c-modal__title">비밀번호 변경 완료</p>
            <p class="c-modal__desc">새로운 비밀번호로 로그인하실 수 있습니다.</p>
        </div>
        <div class="c-modal__footer">
            <button class="btn lg" onclick="document.getElementById('modal-pw-reset').classList.add('is-hidden')">확인</button>
        </div>
    </div>
</div>

</body>
</html>

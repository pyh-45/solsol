<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 폴더 이동</title>
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body>

<div class="c-modal-overlay">
    <div class="c-modal completion-modal folder-move-modal">

        <!-- 헤더 -->
        <div class="completion-modal__header">
            <h3 class="completion-modal__heading">{n}개 콘텐츠 폴더 이동</h3>
            <button type="button" class="completion-modal__close" aria-label="닫기">
                <img src="../../../images/btn-modal-close.svg" width="24" height="24" alt="">
            </button>
        </div>

        <div class="c-modal__content completion-modal__body">

            <p class="folder-move__hint">선택한 콘텐츠가 이동할 폴더를 선택해 주세요.</p>

            <div class="folder-move__list">
                <ul class="folder-tree">
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>개발 (20개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder" checked><span>프론트엔드 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>백엔드 (2개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>모바일 / 앱 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>데이터 / AI (5개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>디자인 (55개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>UI/UX (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>그래픽 디자인 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>영상 / 모션 (5개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>마케팅 (32개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>퍼포먼스 마케팅 (8개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>콘텐츠 마케팅 (10개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>SNS 운영 (7개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>브랜딩 (7개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>비즈니스 (28개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>창업 / 스타트업 (6개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>경영 / 전략 (8개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>재무 / 회계 (7개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>HR / 조직 (7개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>외국어 (40개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>영어 (15개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>일본어 (10개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>중국어 (8개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>스페인어 (4개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>독일어 (3개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>자기계발 (22개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>커리어 / 이직 (6개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>시간 관리 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>커뮤니케이션 (6개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>리더십 (5개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>라이프스타일 (18개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>요리 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>운동 / 건강 (6개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>취미 / 여가 (4개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>여행 (3개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="folder"><span>금융 / 투자 (15개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="folder"><span>주식 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>부동산 (4개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>가상자산 (3개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="folder"><span>재테크 (3개)</span></label></li>
                        </ul>
                    </li>
                </ul>
            </div>

        </div>

        <!-- 푸터 -->
        <div class="c-modal__footer">
            <button type="button" class="btn big" onclick="document.getElementById('modal-folder-move-confirm').classList.remove('is-hidden')">적용</button>
        </div>

    </div>
</div>

    <!-- ===== 모달 목업 갤러리 (디자인 확인용, 기능 없음) ===== -->
    <div style="margin-top:40px; background:#F4F5F7; padding:40px 24px; border-radius:8px; display:flex; flex-wrap:wrap; gap:24px; align-items:flex-start;">

        <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="c-modal">
                    <div class="c-modal__content completion-modal__body">
                        <div class="c-modal__icon-wrap c-modal__icon-wrap--notice">
                            <img src="../../../images/ico-modal-notice.svg" width="36" height="36" alt="">
                        </div>
                        <p class="c-modal__desc">{n}개 콘텐츠를 {폴더}(으)로 이동하시겠어요?</p>
                    </div>
                    <div class="c-modal__footer c-modal__footer--split">
                        <button type="button" class="btn lg border">취소</button>
                        <button type="button" class="btn lg">확인</button>
                    </div>
                </div>
        </div>

    </div>

</body>
</html>

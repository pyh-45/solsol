<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증코드 발송 메일</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #333333; background: #FFFFFF; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; }

        /* 로고 / 디바이더 */
        .auth-logo { text-align: center; font-size: 24px; padding: 30px 0; font-weight: 900; letter-spacing: -0.24px; background: linear-gradient(107deg, #667EEA 0%, #764BA2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .auth-divider { border: none; border-top: 1px solid #EAEAEA; margin: 0; }

        /* 이메일 타이틀 영역 */
        .email-title-bg { position: relative; height: 120px; background-color: #4FC0FC; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-size: 24px; font-weight: 800; letter-spacing: -0.24px; overflow: hidden; }
        .email-title-bg__deco { position: absolute; right: 0; top: 0; height: 100%; width: auto; opacity: 0.1; pointer-events: none; }

        /* 버튼 */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 40px; padding: 0 20px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; white-space: nowrap; letter-spacing: -0.02em; text-decoration: none; }
        .btn.big { min-width: 360px; height: 52px; padding: 0 28px; font-size: 16px; font-weight: 600; color: #fff; border-radius: 6px; background-color: #4FC0FC; }

        /* 이메일 레이아웃 */
        .email-wrap { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; background: #FFFFFF; }
        .email-container { width: 560px; background: #FFFFFF; border-radius: 12px; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .email-section { display: flex; flex-direction: column; gap: 20px; }
        .email-title { font-size: 24px; font-weight: 700; color: #333333; line-height: 1.4; letter-spacing: -0.02em; }
        .email-greeting { font-size: 16px; font-weight: 600; color: #333333; margin: 10px 0; }
        .email-desc { font-size: 14px; color: #666666; line-height: 1.5; }
        .email-desc a { color: #4FC0FC; font-weight: 600; }

        /* 정보 박스 / 폴백 */
        .email-info-box { display: flex; align-items: flex-start; gap: 10px; background: #EBF5FF; border-radius: 8px; padding: 14px 16px; }
        .email-info-text { font-size: 13px; color: #4FC0FC; line-height: 1.5; }
        .email-fallback { display: flex; flex-direction: column; gap: 8px; }
        .email-fallback-label { font-size: 12px; color: #AAAAAA; }
        .email-url-box { background: #F4F5F7; border: 1px solid #E5E7EB; border-radius: 6px; padding: 16px; font-size: 12px; color: #333333; word-break: break-all; line-height: 1.5; }

        /* 보안/시작 안내 */
        .email-security { background: #FFF; border: 1px solid #D2D6E1; border-radius: 8px; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
        .email-security__title { font-size: 13px; font-weight: 700; color: #333333; }
        .email-security__list { list-style: disc; padding-left: 18px; display: flex; flex-direction: column; gap: 3px; }
        .email-security__list li { font-size: 12px; color: #666666; line-height: 1.2; }
        .email-security__list a { color: #027CFA; }

        /* 초대 카드 */
        .email-invite-card { background: #EEF3FA; border-radius: 10px; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
        .email-invite-card__title { font-size: 14px; font-weight: 700; color: #333333; text-align: center; padding-bottom: 14px; border-bottom: 1px solid #D0DCF0; }
        .email-invite-row { display: flex; align-items: center; gap: 12px; }
        .email-invite-col { display: flex; align-items: center; gap: 8px; }
        .email-invite-label { font-size: 12px; color: #AAAAAA; flex-shrink: 0; }
        .email-invite-value { font-size: 13px; color: #333333; }
        .email-invite-badge { display: flex; align-items: center; height: 24px; line-height: 24px; padding: 6px 10px; border: 1px solid #4FC0FC; border-radius: 100px; font-size: 11px; color: #4FC0FC; background: #fff; }

        /* 인증코드 */
        .email-code-row { display: flex; justify-content: center; gap: 6px; }
        .email-code-box { padding: 13px 25px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; color: #222222; background: #F5F8FF; border: 1.5px solid #4FC0FC; border-radius: 10px; }
        .email-code-notice { font-size: 12px; color: #FF0000; text-align: center; margin-top: -10px; }
        .email-code-notice strong { color: #FF0000; font-weight: 600; }
    </style>
</head>
<body>

<div class="email-wrap">
    <div class="email-container">

        <!-- 1. 이메일 타이틀 -->
        <div class="email-title-bg">
            <span>DJ테크트리</span>
            <img class="email-title-bg__deco" src="../../images/email-top-bg.png" alt="">
        </div>

        <!-- 2. 제목 + 안내텍스트 영역 -->
        <div class="email-section">
            <h1 class="email-title">이메일</h1>
            <div>
                <p class="email-greeting"><strong>안녕하세요. {사이트명}입니다.</strong></p>
                <p class="email-desc">
                    회원가입을 위한 이메일 인증코드가 발급되었습니다.<br>
                    아래 인증코드를 입력하여 이메일 인증을 완료해 주세요.
                </p>
            </div>
        </div>
        <hr class="auth-divider">
        <!-- 3. 인증코드 + 안내 영역 -->
        <div class="email-section">
            <div class="email-code-row">
                <div class="email-code-box">3</div>
                <div class="email-code-box">5</div>
                <div class="email-code-box">7</div>
                <div class="email-code-box">6</div>
                <div class="email-code-box">9</div>
                <div class="email-code-box">0</div>
            </div>
            <p class="email-code-notice">위 인증코드가 <strong>이메일</strong>로 발송되었습니다.</p>
            <div class="email-info-box">
                <img src="../../images/ico-info-circle.svg" width="16" height="16" alt="" style="flex-shrink:0; margin-top:2px;">
                <p class="email-info-text">
                    <strong>인증코드는 발송 후 10분간 유효합니다.</strong><br>
                    시간이 초과된 경우 인증코드 재발송을 요청해 주세요.
                </p>
            </div>
        </div>
        <hr class="auth-divider">
        <!-- 4. 보안 안내 영역 -->
        <div class="email-section">
            <div class="email-security">
                <p class="email-security__title">보안 안내</p>
                <ul class="email-security__list">
                    <li>인증코드를 타인에게 알려주지 마세요.</li>
                    <li>본 메일을 요청하지 않으셨다면 즉시 관리자에게 알려 주세요.</li>
                    <li>본 메일에 개인 정보 입력을 요구하는 내용은 포함되어 있지 않습니다.</li>
                </ul>
            </div>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 카테고리 이동</title>
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body style="background:#888; padding:60px 0;">

<div style="display:flex; justify-content:center; gap:40px; align-items:flex-start;">

    <!-- 카테고리 이동 (600) -->
    <div class="c-modal completion-modal folder-move-modal">

        <!-- 헤더 -->
        <div class="completion-modal__header">
            <h3 class="completion-modal__heading">{n}개 상품 카테고리 이동</h3>
            <button type="button" class="completion-modal__close" aria-label="닫기">
                <img src="../../../images/btn-modal-close.svg" width="24" height="24" alt="">
            </button>
        </div>

        <div class="c-modal__content completion-modal__body">

            <p class="folder-move__hint">선택한 상품이 이동할 카테고리를 선택해 주세요.</p>

            <div class="folder-move__list">
                <ul class="folder-tree">
                    <li>
                        <label class="c-radio"><input type="radio" name="category"><span>개발 (20개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="category" checked><span>프론트엔드 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="category"><span>백엔드 (2개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="category"><span>모바일 / 앱 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="category"><span>데이터 / AI (5개)</span></label></li>
                        </ul>
                    </li>
                    <li>
                        <label class="c-radio"><input type="radio" name="category"><span>디자인 (55개)</span></label>
                        <ul class="folder-tree__sub">
                            <li><label class="c-radio"><input type="radio" name="category"><span>UI/UX (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="category"><span>그래픽 디자인 (5개)</span></label></li>
                            <li><label class="c-radio"><input type="radio" name="category"><span>영상 / 모션 (5개)</span></label></li>
                        </ul>
                    </li>
                </ul>
            </div>

        </div>

        <!-- 푸터 -->
        <div class="c-modal__footer">
            <button type="button" class="btn big" style="width:100%;">적용</button>
        </div>

    </div>

    <!-- 우측: alert 2종 -->
    <div style="display:flex; flex-direction:column; gap:30px;">

        <!-- alert 1-a: 이동 확인 (취소/확인) -->
        <div class="c-modal">
            <div class="c-modal__content">
                <div class="c-modal__icon-wrap c-modal__icon-wrap--notice">
                    <img src="../../../images/ico-modal-notice.svg" width="36" height="36" alt="">
                </div>
                <p class="c-modal__desc">{n}개 상품을 {카테고리}(으)로 이동하시겠어요?</p>
            </div>
            <div class="c-modal__footer c-modal__footer--split">
                <button type="button" class="btn lg border">취소</button>
                <button type="button" class="btn lg primary">확인</button>
            </div>
        </div>

        <!-- alert 1-b: 이동 완료 -->
        <div class="c-modal">
            <div class="c-modal__content">
                <div class="c-modal__icon-wrap">
                    <img src="../../../images/ico-modal-success.svg" width="36" height="36" alt="">
                </div>
                <p class="c-modal__desc">{n}개 상품이 {카테고리명}(으)로 이동되었습니다.</p>
            </div>
            <div class="c-modal__footer">
                <button type="button" class="btn lg primary" style="width:100%;">확인</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>

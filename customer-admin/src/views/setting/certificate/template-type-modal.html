<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>템플릿 유형 미리보기</title>
    <link rel="stylesheet" href="../../../../css/base.css">
</head>
<body style="background:#888888; padding:40px 20px;">

    <div style="display:flex; flex-direction:column; align-items:center; gap:24px;">

        <!-- 1. 기본형 -->
        <div class="c-modal completion-modal template-type-modal">
            <div class="completion-modal__header">
                <h3 class="completion-modal__heading">템플릿 유형 미리보기</h3>
                <button type="button" class="completion-modal__close" aria-label="닫기">
                    <img src="../../../images/btn-modal-close.svg" width="24" height="24" alt="">
                </button>
            </div>
            <div class="template-type-modal__body">
                <p class="template-type-modal__label">기본형 (1)</p>
                <img class="template-type-modal__img" src="../../../images/template-type-basic.png" alt="기본형 수료증">
            </div>
            <div class="template-type-modal__footer">
                <button type="button" class="btn big" style="width:100%;">선택</button>
            </div>
        </div>

        <!-- 2. 세로형 -->
        <div class="c-modal completion-modal template-type-modal">
            <div class="completion-modal__header">
                <h3 class="completion-modal__heading">템플릿 유형 미리보기</h3>
                <button type="button" class="completion-modal__close" aria-label="닫기">
                    <img src="../../../images/btn-modal-close.svg" width="24" height="24" alt="">
                </button>
            </div>
            <div class="template-type-modal__body">
                <p class="template-type-modal__label">세로형 (1)</p>
                <img class="template-type-modal__img" src="../../../images/template-type-vertical.png" alt="세로형 수료증">
            </div>
            <div class="template-type-modal__footer">
                <button type="button" class="btn big" style="width:100%;">선택</button>
            </div>
        </div>

        <!-- 3. 영문형 -->
        <div class="c-modal completion-modal template-type-modal">
            <div class="completion-modal__header">
                <h3 class="completion-modal__heading">템플릿 유형 미리보기</h3>
                <button type="button" class="completion-modal__close" aria-label="닫기">
                    <img src="../../../images/btn-modal-close.svg" width="24" height="24" alt="">
                </button>
            </div>
            <div class="template-type-modal__body">
                <p class="template-type-modal__label">영문형 (1)</p>
                <img class="template-type-modal__img" src="../../../images/template-type-eng.png" alt="영문형 수료증">
            </div>
            <div class="template-type-modal__footer">
                <button type="button" class="btn big" style="width:100%;">선택</button>
            </div>
        </div>

    </div>

</body>
</html>
